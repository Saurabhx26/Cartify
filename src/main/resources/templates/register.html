<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
	th:replace="~{base::layout(~{::section})}">
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
</head>
<body>
	<section>
		<div class="container-fluid register-bg">
    <div class="row justify-content-center align-items-center vh-100">

        <!-- Left Image -->
        <div class="col-md-5 d-none d-md-block text-center">
            <img src="img/ecom.png" class="img-fluid register-img">
        </div>

        <!-- Register Card -->
        <div class="col-md-6">
            <div class="register-card">

                <h3 class="text-center mb-4">Create Account â¨</h3>

                <!-- Success Message -->
                <th:block th:if="${session.succMsg}">
                    <p class="text-success text-center fw-bold">[[${session.succMsg}]]</p>
                    <th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
                </th:block>

                <!-- Error Message -->
                <th:block th:if="${session.errorMsg}">
                    <p class="text-danger text-center fw-bold">[[${session.errorMsg}]]</p>
                    <th:block th:text="${@commnServiceImpl.removeSessionMessage()}"></th:block>
                </th:block>

                <form action="/saveUser" enctype="multipart/form-data" method="post">

                    <div class="row">
                        <div class="col form-group">
                            <input type="text" name="name" required>
                            <label>Full Name</label>
                        </div>

                        <div class="col form-group">
                            <input type="number" name="mobileNumber" required>
                            <label>Mobile Number</label>
                        </div>
                    </div>

                    <div class="form-group mt-3">
                        <input type="email" name="email" required>
                        <label>Email</label>
                    </div>

                    <div class="row mt-3">
                        <div class="col form-group">
                            <input type="text" name="address" required>
                            <label>Address</label>
                        </div>

                        <div class="col form-group">
                            <input type="text" name="city" required>
                            <label>City</label>
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col form-group">
                            <input type="text" name="state" required>
                            <label>State</label>
                        </div>

                        <div class="col form-group">
                            <input type="number" name="pincode" required>
                            <label>Pincode</label>
                        </div>
                    </div>

                    <div class="row mt-3">
                        <div class="col form-group">
                            <input type="password" name="password" required>
                            <label>Password</label>
                        </div>

                        <div class="col form-group">
                            <input type="password" name="confirmpassword" required>
                            <label>Confirm Password</label>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label class="text-white">Profile Image</label>
                        <input class="form-control file-input" name="img" type="file">
                    </div>

                    <button type="submit" class="btn-register w-100 mt-4">
                        Register
                    </button>

                </form>

                <div class="text-center mt-3">
                    Already have an account?
                    <a href="/signin">Login</a>
                </div>

            </div>
        </div>

    </div>
</div>

	</section>
</body>
</html>
